name: Deploy LaCave420 to GitHub Pages

# Publishes the self-contained LaCave420.html as a static GitHub Pages site.
# Before the first run, enable Pages in the repo:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"

on:
  push:
    branches: [main]
    paths:
      - LaCave420.html
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p public
          cp LaCave420.html public/index.html
          # Block crawlers as an extra privacy layer (the page also sends noindex).
          printf 'User-agent: *\nDisallow: /\n' > public/robots.txt
          # Serve files as-is (no Jekyll processing).
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
